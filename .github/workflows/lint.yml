name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-lint:
    name: PHP syntax (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
          coverage: none

      - name: Lint PHP files
        run: |
          fails=0
          while IFS= read -r -d '' file; do
            php -l "$file" > /dev/null 2>&1 || { echo "Syntax error in $file"; fails=$((fails+1)); }
          done < <(find . -type f -name '*.php' -not -path './node_modules/*' -not -path './vendor/*' -print0)
          exit $fails

  phpcs:
    name: PHPCS (WordPress-Extra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: cs2pr, phpcs
          coverage: none

      - name: Install WPCS
        run: |
          composer global require --dev --no-interaction \
            wp-coding-standards/wpcs:"^3.1" \
            phpcsstandards/phpcsutils:"^1.0" \
            phpcsstandards/phpcsextra:"^1.2"
          phpcs --config-set installed_paths $(composer global config home)/vendor/wp-coding-standards/wpcs,$(composer global config home)/vendor/phpcsstandards/phpcsutils,$(composer global config home)/vendor/phpcsstandards/phpcsextra

      - name: Run PHPCS on Underway core
        run: |
          phpcs --standard=WordPress-Extra --report=checkstyle --runtime-set testVersion 8.1- src underway.php uninstall.php | cs2pr
        continue-on-error: true
